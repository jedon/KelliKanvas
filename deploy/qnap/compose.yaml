services:
  updates:
    image: nginx:1.28.0-alpine3.21@sha256:30f1c0d78e0ad60901648be663a710bdadf19e4c10ac6782c235200619158284
    container_name: kellikanvas-updates
    restart: unless-stopped
    user: "101:101"
    read_only: true
    ports:
      - "${KELLIKANVAS_BIND_ADDRESS:?set designated LAN address}:8088:8088"
    volumes:
      - /share/Public/KelliKanvas:/srv/updates:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8088/update-envelope.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
