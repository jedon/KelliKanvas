services:
  apk-host:
    image: nginx:1.30.4-alpine@sha256:59d10bca5c674965ef4ff884715000dd60ef5567c36663523f108eec8e4105d4
    container_name: kellikanvas-apk-host
    user: "101:101"
    ports:
      - "192.168.68.62:8088:8080"
    volumes:
      - /share/Public/KelliKanvas:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    read_only: true
    cpus: 0.5
    mem_limit: 64m
    pids_limit: 64
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1:8080/healthz
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
