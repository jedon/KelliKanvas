name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Install Android SDK 37.0
        run: |
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-37.0" \
            "build-tools;36.0.0" \
            "platform-tools"
          test -f "$ANDROID_SDK_ROOT/platforms/android-37.0/android.jar"
          test -f "$ANDROID_SDK_ROOT/build-tools/36.0.0/aapt2"

      - name: Guard uncovered androidTest modules
        run: |
          set -euo pipefail
          uncovered="$(
            find . -type f -name '*.kt' -path '*/src/androidTest/*' \
              | sed 's|^\./||' \
              | sort -u \
              | grep -Ev '^(app|core/catalog|core/security|platform/update|source/saf)/src/androidTest/' \
              || true
          )"
          if [[ -n "$uncovered" ]]; then
            echo "::error::Uncovered androidTest sources found. Add the owning module to CI connectedAndroidTest runs (or extend the allowlist only if another workflow already runs them)."
            printf '%s\n' "$uncovered"
            exit 1
          fi

      - name: Test convention plugins
        run: ./gradlew --dependency-verification strict :build-logic:test --stacktrace

      - name: Check and assemble
        run: ./gradlew --dependency-verification strict ktlintCheck lintDebug testDebugUnitTest assembleDebug assembleDebugAndroidTest --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kellikanvas-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kellikanvas-build-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: warn

  instrumented:
    needs: android
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Run instrumented tests on API 34
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: true
          emulator-boot-timeout: 600
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: >-
            ./gradlew --dependency-verification strict
            :source:saf:connectedDebugAndroidTest
            :core:catalog:connectedDebugAndroidTest
            :core:security:connectedDebugAndroidTest
            --stacktrace
