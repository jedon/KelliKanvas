name: Signed release APK

on:
  workflow_dispatch:
    inputs:
      release_sequence:
        description: Monotonic authenticated release sequence
        required: true
        type: number

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Install Android SDK
        run: |
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-37.0" "build-tools;36.0.0" "platform-tools"
          echo "$ANDROID_SDK_ROOT/build-tools/36.0.0" >> "$GITHUB_PATH"

      - name: Test and lint
        run: |
          python -m unittest tools.tests.test_build_update_bundle
          python -m unittest tools.tests.test_qnap_deployment
          ./gradlew ktlintCheck lintDebug testDebugUnitTest --stacktrace

  release:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Install Android SDK
        run: |
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-37.0" "build-tools;36.0.0" "platform-tools"
          echo "$ANDROID_SDK_ROOT/build-tools/36.0.0" >> "$GITHUB_PATH"

      - name: Isolated signing and metadata step
        env:
          KEYSTORE_BASE64: ${{ secrets.KELLIKANVAS_KEYSTORE_BASE64 }}
          KELLIKANVAS_KEYSTORE_PASSWORD: ${{ secrets.KELLIKANVAS_KEYSTORE_PASSWORD }}
          KELLIKANVAS_KEY_ALIAS: ${{ secrets.KELLIKANVAS_KEY_ALIAS }}
          KELLIKANVAS_KEY_PASSWORD: ${{ secrets.KELLIKANVAS_KEY_PASSWORD }}
          METADATA_PRIVATE_KEY_BASE64: ${{ secrets.KELLIKANVAS_METADATA_PRIVATE_KEY_BASE64 }}
          KELLIKANVAS_METADATA_PUBLIC_KEY_BASE64: ${{ vars.KELLIKANVAS_METADATA_PUBLIC_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p .release
          export KELLIKANVAS_KEYSTORE_FILE="$PWD/.release/kellikanvas.jks"
          metadata_key="$PWD/.release/metadata-key.pem"
          cleanup() { rm -rf .release; }
          trap cleanup EXIT
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KELLIKANVAS_KEYSTORE_FILE"
          printf '%s' "$METADATA_PRIVATE_KEY_BASE64" | base64 --decode > "$metadata_key"
          chmod 600 "$KELLIKANVAS_KEYSTORE_FILE" "$metadata_key"
          unset KEYSTORE_BASE64 METADATA_PRIVATE_KEY_BASE64
          ./gradlew :app:assembleRelease --stacktrace
          unset KELLIKANVAS_KEYSTORE_PASSWORD KELLIKANVAS_KEY_ALIAS KELLIKANVAS_KEY_PASSWORD
          python tools/build_update_bundle.py \
            app/build/outputs/apk/release/app-release.apk \
            --apksigner "$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" \
            --apkanalyzer "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/apkanalyzer" \
            --metadata-private-key "$metadata_key" \
            --sequence "${{ inputs.release_sequence }}"
          cleanup
          trap - EXIT

      - name: Upload signed private bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kellikanvas-private-update
          path: dist/
          if-no-files-found: error
          retention-days: 14
