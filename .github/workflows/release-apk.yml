name: Signed release APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      KELLIKANVAS_KEYSTORE_FILE: ${{ github.workspace }}/.release/kellikanvas.jks
      KELLIKANVAS_KEYSTORE_PASSWORD: ${{ secrets.KELLIKANVAS_KEYSTORE_PASSWORD }}
      KELLIKANVAS_KEY_ALIAS: ${{ secrets.KELLIKANVAS_KEY_ALIAS }}
      KELLIKANVAS_KEY_PASSWORD: ${{ secrets.KELLIKANVAS_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Install Android SDK
        run: |
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-37.0" "build-tools;36.0.0" "platform-tools"
          echo "$ANDROID_SDK_ROOT/build-tools/36.0.0" >> "$GITHUB_PATH"

      - name: Materialize release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KELLIKANVAS_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          mkdir -p .release
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KELLIKANVAS_KEYSTORE_FILE"
          test -s "$KELLIKANVAS_KEYSTORE_FILE"

      - name: Test and lint
        run: |
          python -m unittest tools.tests.test_build_update_bundle
          ./gradlew ktlintCheck lintRelease testDebugUnitTest --stacktrace

      - name: Build signed release
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Build verified update bundle
        run: |
          python tools/build_update_bundle.py \
            app/build/outputs/apk/release/app-release.apk \
            --apksigner "$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" \
            --apkanalyzer "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/apkanalyzer"

      - name: Upload signed private bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kellikanvas-private-update
          path: dist/
          if-no-files-found: error
          retention-days: 14
